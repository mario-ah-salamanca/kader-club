name: Bug Report
description: Something is broken or behaving incorrectly.
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes / Evidence
    validations:
      required: false

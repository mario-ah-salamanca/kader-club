name: Task
description: A concrete implementation or project-management task.
title: "[Task]: "
labels: ["type: task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be achieved?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this matter?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included?
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: What should not be done in this issue?
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

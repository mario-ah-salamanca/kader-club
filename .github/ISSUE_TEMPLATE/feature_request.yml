name: Feature Request
description: A user-facing product capability.
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: textarea
    id: user-job
    attributes:
      label: User Job
      description: What user problem does this solve?
      placeholder: As a collector, I want to...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the simplest useful version.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
